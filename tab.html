<body>
<div class="toolbar">
  <svg class="toolbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
  <span class="toolbar-title">Builder.io</span>

  <select class="space-select" id="spaceSelect" onchange="switchSpace(this.value)"></select>

</div>

  <button class="btn primary" style="padding:8px 24px;" onclick="Symphonee.openSettings('plugins')">Open Settings</button>
</div>
<div class="main no-detail" id="mainView" style="display:none;">
  <div class="sidebar" id="sidebar"></div>
  <div class="home" id="homeView" style="display:none;"></div>
  <div class="home" id="insightsView" style="display:none;overflow:auto;"></div>
  <div class="content-col" id="contentCol" style="display:none;">
    <div class="filter-bar"><input class="search" id="searchInput" type="text" placeholder="Search..." oninput="onSearch()"><select class="sel" id="statusFilter" onchange="onStatusFilter()" style="display:none;"><option value="all">All</option><option value="published">Published</option><option value="draft">Drafts</option></select><button class="btn sm" id="modelSchemaBtn" style="display:none;" onclick="openModelSchema()" title="View model schema JSON">Schema</button><span class="count" id="listCount"></span></div>
    <div class="list" id="listContainer"></div>
  </div>
  <div class="detail" id="detailPanel">
    <div class="detail-header"><div style="flex:1;min-width:0;"><div class="detail-title" id="detailTitle"></div><div class="detail-subtitle" id="detailSubtitle"></div></div><button class="btn-icon" onclick="closeDetail()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="tabs" id="detailTabs"></div>
    <div class="detail-body" id="detailBody"><div class="tab-panel active" id="panelContent"></div><div class="tab-panel" id="panelSchema"></div><div class="tab-panel" id="panelMeta"></div></div>
    <div class="detail-preview-wrap" id="detailPreviewWrap"></div>
    <div class="detail-actions" id="detailActions"></div>
  </div>
</div>
<div class="editor-view" id="editorView">
  <div class="editor-toolbar"><button class="btn sm" onclick="closeEditor()">Back</button><h2 id="editorTitle"></h2><span class="path" id="editorPath"></span><span class="spacer"></span><button class="btn primary sm" onclick="saveEditor()">Save</button></div>
  <div id="editorContainer"></div>

</div>
<div id="modalRoot"></div>

<script>
var API='/api/plugins/builderio';
var state={configured:false,spaces:[],activeSpace:'',section:null,items:[],selected:null,search:'',statusFilter:'all',health:null,models:[]};

function showMiddleLoader(msg){var hv=document.getElementById('homeView');if(hv){hv.style.display='flex';hv.innerHTML='<div class="middle-loader"><div class="loader-stack"><div class="loader-ring"></div><div class="loader-label">'+(msg||'Loading...')+'</div></div></div>';}var cc=document.getElementById('contentCol');if(cc)cc.style.display='none';document.getElementById('mainView').classList.add('no-detail');}
function structuredSidebarSkeleton(){var s='<div class="skeleton">';s+='<div class="skeleton-section-title"></div>';s+='<div class="skeleton-row"></div>';s+='<div class="skeleton-section-title"></div>';for(var i=0;i<3;i++)s+='<div class="skeleton-row"></div>';s+='<div class="skeleton-section-title"></div>';for(var j=0;j<2;j++)s+='<div class="skeleton-row"></div>';s+='<div class="skeleton-section-title"></div>';s+='<div class="skeleton-row"></div>';s+='</div>';return s;}
async function init(){await loadSpaceSelector();var cfg=await api('GET','/config');if(!cfg||!cfg.configured){document.getElementById('setupScreen').style.display='flex';document.getElementById('mainView').style.display='none';return;}state.configured=true;document.getElementById('setupScreen').style.display='none';document.getElementById('mainView').style.display='flex';document.getElementById('sidebar').innerHTML=structuredSidebarSkeleton();showMiddleLoader('Loading Builder.io space...');await loadHealth();renderSidebar();selectSection({kind:'home',slug:'home',label:'Home'});}
async function refresh(){if(state.section&&state.section.kind==='home'){await loadHealth();renderHome();}else await loadSection();}

async function loadSpaceSelector(){try{var r=await api('GET','/spaces');state.spaces=r.spaces||[];state.activeSpace=r.activeSpace||'';}catch(_){state.spaces=[];state.activeSpace='';}var sel=document.getElementById('spaceSelect');if(!state.spaces.length){sel.innerHTML='<option value="">-- not configured --</option>';return;}sel.innerHTML=state.spaces.map(function(s){return'<option value="'+esc(s.name)+'"'+(s.name===state.activeSpace?' selected':'')+'>'+esc(s.name)+'</option>';}).join('');}
async function switchSpace(name){if(!name)return;await api('POST','/spaces/active',{name:name});state.activeSpace=name;var space=state.spaces.find(function(s){return s.name===name;});if(space&&space.repoPath){try{var repos=await(await fetch('/api/repos')).json();var norm=space.repoPath.replace(/\\\\/g,'/').replace(/\\/g,'/').replace(/\/+$/,'');for(var rn in repos){if(repos[rn].replace(/\\\\/g,'/').replace(/\\/g,'/').replace(/\/+$/,'')===norm){await fetch('/api/ui/context',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({activeRepo:rn})});break;}}}catch(_){}}await init();}

async function loadHealth(){var dot=document.getElementById('connDot');dot.className='conn-dot pending';var h=await api('GET','/health');if(h.error){dot.className='conn-dot err';state.health=null;state.models=[];return;}dot.className='conn-dot ok';state.health=h;state.models=h.models||[];var btn=document.getElementById('dashboardBtn');if(btn)btn.style.display=h.dashboardUrl?'':'none';var envSel=document.getElementById('envSelect');if(envSel){var envs=Array.isArray(h.environments)?h.environments:[];if(envs.length>1){envSel.innerHTML=envs.map(function(e){return'<option value="'+esc(e.id)+'">'+esc(e.label)+'</option>';}).join('');envSel.value=h.activeEnv||envs[0].id;envSel.style.display='';}else{envSel.style.display='none';}}}
async function switchEnv(env){showMiddleLoader('Switching to '+env+'...');await api('POST','/env',{env:env});await loadHealth();if(state.section&&state.section.kind==='home'){renderHome();}else if(state.section){document.getElementById('homeView').style.display='none';document.getElementById('contentCol').style.display='flex';await loadSection();}else{renderHome();}}
function openDashboard(){var url=state.health&&state.health.dashboardUrl;if(url)window.open(url,'_blank');}

function renderSidebar(){var h=state.health||{};var models=state.models;var html='<div class="nav-section">'+navItem('home','Home',iconSvg('home'),null)+navItem('insights','Insights',iconSvg('search'),null)+navItem('assets','Assets',iconSvg('image'),null)+'</div>';var kinds={};models.forEach(function(m){if(!kinds[m.kind])kinds[m.kind]=[];kinds[m.kind].push(m);});['page','section','component','data'].forEach(function(kind){var list=kinds[kind];if(!list||!list.length)return;html+='<div class="nav-section"><div class="nav-section-title">'+kind.charAt(0).toUpperCase()+kind.slice(1)+'s</div>';list.forEach(function(m){html+=navItem('model:'+m.name,displayName(m.name),iconSvg(kind==='page'?'file-text':kind==='data'?'database':'layout'),m.total);});html+='</div>';});if(h.repoPath){html+='<div class="nav-section"><div class="nav-section-title">Studio</div>'+navItem('studio:components','Components',iconSvg('code'),null)+'</div>';}document.getElementById('sidebar').innerHTML=html;highlightNav();}
function navItem(slug,label,icon,count){return'<div class="nav-item" data-slug="'+slug+'" onclick="onNavClick(\''+slug+'\')"><span class="nav-icon">'+icon+'</span><span class="nav-label">'+esc(label)+'</span>'+(count!==null&&count!==undefined?'<span class="nav-count">'+count+'</span>':'')+'</div>';}
function highlightNav(){var slug=state.section?(state.section.slug||''):'';document.querySelectorAll('.nav-item').forEach(function(el){el.classList.toggle('active',el.dataset.slug===slug);});}
function onNavClick(slug){if(slug==='home')selectSection({kind:'home',slug:'home',label:'Home'});else if(slug==='insights')selectSection({kind:'insights',slug:'insights',label:'Insights'});else if(slug==='assets')selectSection({kind:'assets',slug:'assets',label:'Assets'});else if(slug.startsWith('model:')){var name=slug.slice(6);var m=state.models.find(function(x){return x.name===name;});selectSection({kind:'model',slug:slug,modelName:name,label:displayName(name),count:m?m.total:0,modelId:m?m.id:''});}else if(slug==='studio:components')selectSection({kind:'studio',slug:slug,studioView:'components',label:'Components'});}

function selectSection(section){state.section=section;state.search='';state.statusFilter='all';state.selected=null;var si=document.getElementById('searchInput');if(si)si.value='';highlightNav();closeDetail();document.getElementById('mainView').style.display='flex';document.getElementById('editorView').classList.remove('active');var iv=document.getElementById('insightsView');if(section.kind==='home'){document.getElementById('homeView').style.display='flex';document.getElementById('contentCol').style.display='none';if(iv)iv.style.display='none';document.getElementById('mainView').classList.add('no-detail');renderHome();}else if(section.kind==='insights'){document.getElementById('homeView').style.display='none';document.getElementById('contentCol').style.display='none';if(iv)iv.style.display='block';document.getElementById('mainView').classList.add('no-detail');loadInsights(section.preset||{});}else if(section.kind==='assets'){document.getElementById('homeView').style.display='none';document.getElementById('contentCol').style.display='none';if(iv)iv.style.display='block';document.getElementById('mainView').classList.add('no-detail');loadAssets();}else{document.getElementById('homeView').style.display='none';if(iv)iv.style.display='none';document.getElementById('contentCol').style.display='flex';document.getElementById('statusFilter').style.display=section.kind==='model'?'':'none';var msb=document.getElementById('modelSchemaBtn');if(msb)msb.style.display=section.kind==='model'?'':'none';loadSection();}}

function renderHome(){var h=state.health;if(!h){document.getElementById('homeView').innerHTML='<div class="empty-msg">Could not load data.</div>';return;}var html='<div class="home-header"><h1>Dashboard</h1><div class="home-subtitle">Builder.io Space</div></div>';html+='<div style="display:flex;gap:8px;flex-wrap:wrap;">';if(h.dashboardUrl)html+='<div style="display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--surface0);border:1px solid var(--overlay0);border-radius:var(--radius);font-size:12px;cursor:pointer;" onclick="openDashboard()"><span>Builder.io Dashboard</span></div>';if(h.repoPath)html+='<div style="display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--surface0);border:1px solid var(--overlay0);border-radius:var(--radius);font-size:12px;"><span>Repo: '+esc(h.repoPath.replace(/\\\\/g,'/').replace(/\\/g,'/'))+'</span></div>';if(h.previewUrl)html+='<div style="display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--surface0);border:1px solid var(--overlay0);border-radius:var(--radius);font-size:12px;cursor:pointer;" onclick="window.open(\''+esc(h.previewUrl)+'\',\'_blank\')"><span>Live Site: '+esc(h.previewUrl)+'</span></div>';html+='</div>';html+='<div class="home-grid">'+homeCard(h.totalModels,'Models','accent')+homeCard(h.totalEntries,'Total Entries','green')+homeCard(h.totalPublished,'Published','green')+homeCard(h.totalDrafts,'Drafts',h.totalDrafts>20?'yellow':'peach')+'</div>';html+='<div class="home-section-title">Quick Actions</div><div class="home-quick-actions">'+homeAction('Generate Content','Create entries for a model using AI','aiGenerate')+homeAction('Create Model','Define a new content model','aiCreateModel')+homeAction('Find Stale Content','Entries not updated recently','aiStale')+homeAction('Export & Backup','Export all entries of a model','aiExport')+homeAction('Bulk Update','Update a field across entries','aiBulk')+homeAction('Ask AI About Space','Get insights about your space','aiAsk')+'</div>';if(h.issues&&h.issues.length){html+='<div class="home-section-title">Issues</div><div class="home-issues">';h.issues.forEach(function(iss){var f=iss.issue||'';if(!f){if(/drafts/i.test(iss.message))f='draft';else if(/empty model/i.test(iss.message))f='empty';else if(/stale/i.test(iss.message))f='stale';else if(/alt/i.test(iss.message))f='missing-alt';}html+='<div class="home-issue '+iss.level+'" style="cursor:pointer;" onclick="goToInsights(\''+f+'\')">'+esc(iss.message)+'</div>';});html+='</div>';}if(h.recent&&h.recent.length){html+='<div class="home-section-title">Recent Activity</div><div class="home-recent">';h.recent.forEach(function(e){html+='<div class="home-recent-item"><span class="home-recent-name">'+esc(e.name||e.id)+'</span><span class="home-recent-type">'+esc(e._modelName||'')+'</span><span class="home-recent-time">'+timeAgo(e.lastUpdated)+'</span></div>';});html+='</div>';}if(h.previewUrl){html+=renderHomePreview(h.previewUrl);}document.getElementById('homeView').innerHTML=html;if(h.previewUrl){homePreviewZoom=1;api('GET','/preview-check?url='+encodeURIComponent(h.previewUrl)).then(function(check){if(!check||!check.ok)return;requestAnimationFrame(function(){var vp=document.getElementById('homePreviewViewport');if(vp){var w=vp.clientWidth;if(w>0)vp.style.height=Math.round(w*9/16)+'px';}setupHomePreview(h.previewUrl);});});}}
function homeCard(val,label,color){return'<div class="home-card"><div class="hc-val '+color+'">'+val+'</div><div class="hc-label">'+label+'</div></div>';}
function homeAction(title,desc,action){return'<div class="home-action" onclick="homeActionClick(\''+action+'\')"><div class="ha-title">'+esc(title)+'</div><div class="ha-desc">'+esc(desc)+'</div></div>';}
function homeActionClick(action){if(action==='aiGenerate'){modelPickerThenAi('Generate Content',function(m){Symphonee.askAi('Generate content for Builder.io model "'+m+'".\ncurl -s http://127.0.0.1:3800/api/plugins/builderio/summary/'+m+'\n\nAsk how many entries to create.');});}else if(action==='aiCreateModel'){Symphonee.askAi('Create a new Builder.io model.\ncurl -s http://127.0.0.1:3800/api/plugins/builderio/summary\n\nAsk me what kind (data, page, component, section), name, and fields.');}else if(action==='aiStale'){Symphonee.askAi('Find stale content.\ncurl -s http://127.0.0.1:3800/api/plugins/builderio/health\n\nList entries not updated in 30+ days.');}else if(action==='aiExport'){modelPickerThenAi('Export',function(m){Symphonee.askAi('Export all entries from "'+m+'":\ncurl -s -X POST http://127.0.0.1:3800/api/plugins/builderio/content/'+m+'/export\n\nSave as a note.');});}else if(action==='aiBulk'){Symphonee.askAi('Bulk update entries.\ncurl -s http://127.0.0.1:3800/api/plugins/builderio/summary\n\nAsk which model and field to update.');}else if(action==='aiAsk'){Symphonee.askAi('Analyze my Builder.io space:\ncurl -s http://127.0.0.1:3800/api/plugins/builderio/health\ncurl -s http://127.0.0.1:3800/api/plugins/builderio/summary\n\nGive insights.');}}
function goToInsights(issueType){selectSection({kind:'insights',slug:'insights',label:'Insights',preset:issueType?{issue:issueType}:{}});}
var insightsData=null;var insightsFilters={issue:'',model:'',status:'',search:''};
async function loadInsights(preset){var iv=document.getElementById('insightsView');iv.innerHTML='<div class="middle-loader"><div class="loader-stack"><div class="loader-ring"></div><div class="loader-label">Scanning all entries...</div></div></div>';insightsFilters={issue:preset.issue||'',model:preset.model||'',status:preset.status||'',search:''};try{insightsData=await api('GET','/insights');}catch(e){iv.innerHTML='<div class="empty-msg">Failed to load insights</div>';return;}if(insightsData.error){iv.innerHTML='<div class="empty-msg">'+esc(insightsData.error)+'</div>';return;}renderInsights();}
function renderInsights(){var iv=document.getElementById('insightsView');var d=insightsData;if(!d)return;var c=d.counts||{};var chip=function(key,label,val,color){var active=insightsFilters.issue===key;return'<div class="home-card" style="cursor:pointer;'+(active?'outline:2px solid var(--accent);':'')+'" onclick="setInsightFilter(\'issue\',\''+(active?'':key)+'\')"><div class="hc-val '+color+'">'+val+'</div><div class="hc-label">'+esc(label)+'</div></div>';};var html='<div class="home-header"><h1>Insights</h1><div class="home-subtitle">Smart scan across all models</div></div>';html+='<div class="home-grid">'+chip('','Total',c.total||0,'accent')+chip('draft','Drafts',c.drafts||0,'peach')+chip('stale','Stale (90d+)',c.stale||0,'yellow')+chip('missing-alt','Images w/o Alt',c.missingAlt||0,'yellow')+chip('missing-url','Missing URL',c.missingUrl||0,'red')+chip('duplicate-url','Duplicate URL',c.duplicateUrl||0,'red')+chip('missing-field','Missing Fields',c.missingField||0,'red')+chip('empty','Empty Models',(c.emptyModels||[]).length,'blue')+'</div>';html+='<div style="display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;align-items:center;">';html+='<input class="field-input" id="insightSearch" type="text" placeholder="Search name..." value="'+esc(insightsFilters.search)+'" style="flex:1;min-width:180px;max-width:320px;" oninput="insightsFilters.search=this.value;renderInsightsList();">';html+='<select class="field-input" id="insightModel" onchange="insightsFilters.model=this.value;renderInsightsList();" style="max-width:200px;"><option value="">All models</option>';(d.models||[]).forEach(function(m){html+='<option value="'+esc(m.name)+'"'+(insightsFilters.model===m.name?' selected':'')+'>'+esc(displayName(m.name))+' ('+m.total+')</option>';});html+='</select>';html+='<select class="field-input" id="insightStatus" onchange="insightsFilters.status=this.value;renderInsightsList();" style="max-width:160px;"><option value="">Any status</option><option value="draft"'+(insightsFilters.status==='draft'?' selected':'')+'>Draft</option><option value="published"'+(insightsFilters.status==='published'?' selected':'')+'>Published</option></select>';if(insightsFilters.issue||insightsFilters.model||insightsFilters.status||insightsFilters.search)html+='<button class="btn sm" onclick="insightsFilters={issue:\'\',model:\'\',status:\'\',search:\'\'};renderInsights();">Clear</button>';html+='</div>';if(insightsFilters.issue==='empty'&&(c.emptyModels||[]).length){html+='<div style="margin:8px 0;font-size:12px;color:var(--subtext);">Empty models: '+c.emptyModels.map(esc).join(', ')+'</div>';}html+='<div id="insightsListWrap"></div>';iv.innerHTML=html;renderInsightsList();}
function renderInsightsList(){var wrap=document.getElementById('insightsListWrap');if(!wrap||!insightsData)return;var f=insightsFilters;var list=(insightsData.entries||[]).filter(function(e){if(f.model&&e.modelName!==f.model)return false;if(f.status&&e.status!==f.status)return false;if(f.search){var q=f.search.toLowerCase();if((e.name||'').toLowerCase().indexOf(q)===-1)return false;}if(f.issue){if(f.issue==='empty')return false;if(f.issue==='missing-field')return e.issues.some(function(i){return i.indexOf('missing-field:')===0;});return e.issues.indexOf(f.issue)!==-1;}return true;});list.sort(function(a,b){return(b.lastUpdated||0)-(a.lastUpdated||0);});if(!list.length){wrap.innerHTML='<div class="empty-msg">No entries match the current filters.</div>';return;}var html='<div style="font-size:11px;color:var(--subtext);margin-bottom:6px;">'+list.length+' entries</div>';html+='<div class="list" style="position:relative;">';list.slice(0,500).forEach(function(e){var tags=e.issues.map(function(i){var color='var(--overlay0)';if(i==='draft')color='var(--peach)';else if(i==='stale')color='var(--yellow)';else if(i==='missing-alt')color='var(--yellow)';else if(i==='missing-url'||i==='duplicate-url')color='var(--red)';else if(i.indexOf('missing-field:')===0)color='var(--red)';var label=i.indexOf('missing-field:')===0?'missing: '+i.slice(14):i;return'<span style="font-size:10px;padding:2px 6px;border-radius:4px;background:var(--surface0);border:1px solid '+color+';color:'+color+';margin-right:4px;">'+esc(label)+'</span>';}).join('');html+='<div class="row" onclick="openInsightEntry(\''+esc(e.modelName)+'\',\''+esc(e.id)+'\')" style="cursor:pointer;"><div style="flex:1;min-width:0;"><div class="row-name">'+esc(e.name)+'</div><div class="row-sub">'+esc(displayName(e.modelName))+' \u00b7 '+esc(e.status)+(e.lastUpdated?' \u00b7 '+timeAgo(e.lastUpdated):'')+'</div><div style="margin-top:4px;">'+tags+'</div></div></div>';});html+='</div>';if(list.length>500)html+='<div style="font-size:11px;color:var(--subtext);margin-top:6px;">Showing first 500. Refine filters to narrow results.</div>';wrap.innerHTML=html;}
function setInsightFilter(key,val){insightsFilters[key]=val;renderInsights();}
var assetsData=null,assetsFilters={search:'',pendingSearch:''},assetsPageSize=60,assetsLoading=false;
async function loadAssets(reset){var iv=document.getElementById('insightsView');if(reset!==false){assetsData={assets:[],offset:0,hasMore:true};iv.innerHTML='<div class="middle-loader"><div class="loader-stack"><div class="loader-ring"></div><div class="loader-label">Loading assets...</div></div></div>';}if(assetsLoading)return;assetsLoading=true;try{var q=encodeURIComponent(assetsFilters.search||'');var off=assetsData.assets.length;var r=await api('GET','/assets?limit='+assetsPageSize+'&offset='+off+(q?'&query='+q:''));if(r&&r.error){iv.innerHTML='<div class="empty-msg">'+esc(r.error)+'</div>';assetsLoading=false;return;}var batch=(r&&r.assets)||[];assetsData.assets=assetsData.assets.concat(batch);assetsData.hasMore=!!(r&&r.hasMore);assetsData.totalMatches=r&&r.totalMatches;}catch(e){iv.innerHTML='<div class="empty-msg">Failed to load assets</div>';assetsLoading=false;return;}assetsLoading=false;renderAssets();}
function submitAssetsSearch(){var v=assetsFilters.pendingSearch||'';if(v===assetsFilters.search)return;assetsFilters.search=v;loadAssets(true);}
function clearAssetsSearch(){assetsFilters.pendingSearch='';if(assetsFilters.search===''){renderAssets();return;}assetsFilters.search='';loadAssets(true);}
function onAssetsSearchKey(e){if(e.key==='Enter'){e.preventDefault();submitAssetsSearch();}}
function fmtBytes(n){if(!n&&n!==0)return'';if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(1)+' MB';}
function fmtDate(ms){if(!ms)return'never';var d=new Date(ms);var diff=Date.now()-ms;var days=Math.floor(diff/86400000);if(days<1)return'today';if(days<30)return days+'d ago';if(days<365)return Math.floor(days/30)+'mo ago';return d.toLocaleDateString();}
function renderAssets(){var iv=document.getElementById('insightsView');var d=assetsData;if(!d)return;var list=d.assets||[];var STALE=180*86400000;var staleCount=list.filter(function(a){return a.lastUsed&&(Date.now()-a.lastUsed)>STALE;}).length;var totalBytes=list.reduce(function(s,a){return s+(a.bytes||0);},0);var subtitle=(d.totalMatches!=null?d.totalMatches+' matches, showing '+list.length:list.length+(d.hasMore?'+':'')+' assets')+', '+fmtBytes(totalBytes)+(staleCount?', '+staleCount+' stale (180d+)':'');var html='<div class="home-header"><h1>Assets</h1><div class="home-subtitle">'+subtitle+'</div></div>';var pending=assetsFilters.pendingSearch!==undefined?assetsFilters.pendingSearch:assetsFilters.search;html+='<div style="margin:0 0 12px;display:flex;gap:6px;align-items:center;max-width:520px;"><input id="assetsSearchInput" class="field-input" type="text" placeholder="Search name or URL, press Enter..." value="'+esc(pending)+'" oninput="assetsFilters.pendingSearch=this.value" onkeydown="onAssetsSearchKey(event)" style="flex:1;"><button class="btn sm" onclick="submitAssetsSearch()">Search</button>'+(assetsFilters.search?'<button class="btn sm" onclick="clearAssetsSearch()">Clear</button>':'')+'</div>';if(!list.length){html+='<div class="empty-msg">'+(assetsLoading?'Loading...':'No assets')+'</div>';iv.innerHTML=html;return;}html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;">';list.forEach(function(a){var isImg=(a.type||'').indexOf('image/')===0;var thumb=isImg?'<img src="'+esc(a.url)+'?width=400" loading="lazy" style="width:100%;height:140px;object-fit:cover;background:var(--surface0);">':'<div style="width:100%;height:140px;display:flex;align-items:center;justify-content:center;background:var(--surface0);color:var(--subtext0);font-size:11px;">'+esc(a.type||'file')+'</div>';var stale=a.lastUsed&&(Date.now()-a.lastUsed)>STALE;html+='<div class="home-card" style="padding:0;overflow:hidden;cursor:pointer;" onclick="op Math.min(10,ov.split('\n').length+1)+'" data-json="true">'+esc(ov)+'</textarea><div class="field-hint">Object -- edit as JSON</div></div>';}if(type==='text'){var s=String(displayVal==null?'':displayVal);if(s.length>100||s.indexOf('\n')!==-1)return'<div class="field">'+label+'<textarea class="field-input" id="'+inputId+'" rows="4">'+esc(s)+'</textarea>'+hint+'</div>';return'<div class="field">'+label+'<input class="field-input" id="'+inputId+'" type="text" value="'+esc(s)+'">'+hint+'</div>';}if(displayVal===null||displayVal===undefined)return'<div class="field">'+label+'<input class="field-input" id="'+inputId+'" type="text" value="" placeholder="(empty)">'+hint+'</div>';if(typeof displayVal==='string'){if(displayVal.indexOf('<')!==-1&&displayVal.match(/<[a-z][\s\S]*>/i)){_pendingRte.push({id:inputId+'_rte',html:displayVal,fieldKey:key,type:'html'});return'<div class="field">'+label+'<div id="'+inputId+'_rte" data-rte-mount="true"></div>'+hint+'</div>';}if(displayVal.length>100||displayVal.indexOf('\n')!==-1)return'<div class="field">'+label+'<textarea class="field-input" id="'+inputId+'" rows="4">'+esc(displayVal)+'</textarea>'+hint+'</div>';if(displayVal.match(/^https?:\/\//))return'<div class="field">'+label+'<input class="field-input" id="'+inputId+'" type="url" value="'+esc(displayVal)+'">'+hint+'</div>';return'<div class="field">'+label+'<input class="field-input" id="'+inputId+'" type="text" value="'+esc(displayVal)+'">'+hint+'</div>';}if(Array.isArray(displayVal)||typeof displayVal==='object'){var jv=JSON.stringify(displayVal,null,2);return'<div class="field">'+label+'<textarea class="field-input mono" id="'+inputId+'" rows="'+Math.min(8,jv.split('\n').length+1)+'" data-json="true">'+esc(jv)+'</textarea><div class="field-hint">'+(Array.isArray(displayVal)?'Array ('+displayVal.length+')':'Object')+'</div></div>';}return'<div class="field">'+label+'<input class="field-input" id="'+inputId+'" type="text" value="'+esc(String(displayVal))+'">'+hint+'</div>';}

async function saveEntry(){var entry=state.selected;if(!entry)return;var sec=state.section;var patch={};var nameEl=document.getElementById('field_name');if(nameEl)patch.name=nameEl.value;var fieldDefs=(state.modelFieldsByName&&state.modelFieldsByName[sec.modelName])||[];var byName={};fieldDefs.forEach(function(f){byName[f.name]=f;});var locale=state.currentLocale;var jsonErr=null;activeRteInstances.forEach(function(rte){if(!rte.fieldKey)return;if(!patch.data)patch.data={};var def=byName[rte.fieldKey];var orig=entry.data?entry.data[rte.fieldKey]:null;var html=rte.getHtml();if(def&&def.localized)patch.data[rte.fieldKey]=setLocalized(orig,locale,html);else patch.data[rte.fieldKey]=html;});if(entry.data){Object.keys(entry.data).forEach(function(k){if(jsonErr)return;var def=byName[k];if(def&&def.type==='uiBlocks')return;var el=document.getElementById('field_data_'+k);if(!el)return;var orig=entry.data[k];if(!patch.data)patch.data={};var newVal;if(el.dataset&&el.dataset.json==='true'){try{newVal=JSON.parse(el.value);}catch(_){jsonErr='Invalid JSON in '+k;return;}patch.data[k]=newVal;return;}if(def){if(def.type==='boolean')newVal=el.value==='true';else if(def.type==='number')newVal=el.value===''?null:Number(el.value);else newVal=el.value;}else{if(typeof orig==='boolean')newVal=el.value==='true';else if(typeof orig==='number')newVal=Number(el.value);else newVal=el.value;}if(def&&def.localized)patch.data[k]=setLocalized(orig,locale,newVal);else patch.data[k]=newVal;});}if(jsonErr){showToast(jsonErr,'err');return;}var r=await api('PATCH','/content/'+sec.modelName+'/'+entry.id,patch);if(r.error){showToast('Save failed: '+r.error,'err');return;}showToast('Saved','ok');await loadSection();}

function switchPreviewLocale(i){var urls=window.__previewUrls||[];var u=urls[i];if(!u)return;var frame=document.getElementById('previewFrame');var vp=document.getElementById('previewViewport');if(vp)vp.classList.add('loading');var hdr=document.querySelector('#detailPreviewWrap .preview-section-header .preview-open');if(hdr)hdr.setAttribute('data-url',u.url);if(frame)frame.src=u.url;}

function renderHomePreview(url){return'<div class="home-preview"><div class="home-preview-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg> Live Preview<span class="spacer"></span><button class="btn-mini" onclick="adjustZoom(\'home\',-0.1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button><span class="preview-zoom-label" id="homeZoomLabel">100%</span><button class="btn-mini" onclick="adjustZoom(\'home\',0.1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button><button class="btn-mini" onclick="reloadPreview(\'home\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button><button class="btn-mini" onclick="window.open(\''+esc(url)+'\',\'_blank\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button></div><div class="home-preview-viewport loading" id="homePreviewViewport"><iframe id="homePreviewFrame" referrerpolicy="no-referrer"></iframe></div></div>';}

function mountRichEditor(mountEl,initialHtml,fieldKey){mountEl.innerHTML='';var wrap=document.createElement('div');wrap.className='rte-wrap';var extra=document.createElement('div');extra.className='rte-toolbar-extra';extra.innerHTML='<button type="button" data-act="code"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> Code</button><button type="button" data-act="fullscreen"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg> Fullscreen</button>';wrap.appendChild(extra);var editorEl=document.createElement('div');wrap.appendChild(editorEl);var codeEl=document.createElement('div');codeEl.className='rte-code-view';wrap.appendChild(codeEl);mountEl.appendChild(wrap);var quill=new Quill(editorEl,{theme:'snow',modules:{toolbar:[[{'header':[1,2,3,4,5,6,false]}],['bold','italic','underline','strike'],[{'list':'ordered'},{'list':'bullet'}],[{'align':[]}],['blockquote','code-block'],['link','image'],['clean']]},placeholder:'Write content...'});try{quill.clipboard.dangerouslyPasteHTML(initialHtml||'');}catch(_){}var monaco_rte=null;function getCodeValue(){return monaco_rte?monaco_rte.getValue():'';}function setCodeValue(v){if(monaco_rte)monaco_rte.setValue(v);}async function mountCode(){if(monaco_rte)return;await ensureMonaco();monaco_rte=monaco.editor.create(codeEl,{value:quill.root.innerHTML.replace(/></g,'>\n<'),language:'html',theme:'symphonee',fontSize:12,fontFamily:"'Cascadia Code',Consolas,monospace",minimap:{enabled:false},scrollBeyondLastLine:false,automaticLayout:true,lineNumbers:'on',wordWrap:'on',padding:{top:8},tabSize:2});}extra.querySelector('[data-act="code"]').addEventListener('click',async function(e){e.preventDefault();var btn=e.currentTarget;if(wrap.classList.contains('code-view')){try{quill.clipboard.dangerouslyPasteHTML(getCodeValue());}catch(_){}wrap.classList.remove('code-view');btn.classList.remove('active');}else{await mountCode();setCodeValue(quill.root.innerHTML.replace(/></g,'>\n<'));wrap.classList.add('code-view');btn.classList.add('active');setTimeout(function(){if(monaco_rte){monaco_rte.layout();monaco_rte.focus();}},0);}});extra.querySelector('[data-act="fullscreen"]').addEventListener('click',function(e){e.preventDefault();wrap.classList.toggle('fullscreen');e.currentTarget.classList.toggle('active');setTimeout(function(){if(monaco_rte)monaco_rte.layout();},0);});var rte={fieldKey:fieldKey,getHtml:function(){return wrap.classList.contains('code-view')?getCodeValue():quill.root.innerHTML;},dispose:function(){if(monaco_rte){monaco_rte.dispose();monaco_rte=null;}},quill:quill};activeRteInstances.push(rte);return rte;}

var monacoEditor=null,monacoReady=false,editorCtx=null;
function openJsonEditor(){var entry=state.selected;if(!entry)return;editorCtx={modelName:state.section.modelName,entryId:entry.id,entry:entry};document.getElementById('mainView').style.display='none';document.getElementById('editorView').classList.add('active');document.getElementById('editorTitle').textContent=entry.name||entry.id;document.getElementById('editorPath').textContent=state.section.modelName+'/'+entry.id;document.getElementById('editorStatus').textContent='Loading...';ensureMonaco().then(function(){var container=document.getElementById('editorContainer');if(monacoEditor){monacoEditor.dispose();monacoEditor=null;}monacoEditor=monaco.editor.create(container,{value:JSON.stringify(entry,null,2),language:'json',theme:'symphonee',fontSize:13,fontFamily:"'Cascadia Code',Consolas,monospace",minimap:{enabled:true},scrollBeyondLastLine:false,automaticLayout:true,lineNumbers:'on',bracketPairColorization:{enabled:true},padding:{top:8},tabSize:2});monacoEditor.addCommand(monaco.KeyMod.CtrlCmd|monaco.KeyCode.KeyS,function(){saveEditor();});document.getElementById('editorStatus').textContent='Ready';});}
function closeEditor(){document.getElementById('editorView').classList.remove('active');document.getElementById('mainView').style.display='flex';var tb=document.querySelector('#editorView .editor-toolbar');var saveBtn=tb&&tb.querySelector('.btn.primary');if(saveBtn)saveBtn.style.display='';}
async function openModelSchema(){var sec=state.section;if(!sec||sec.kind!=='model')return;if(!sec.modelId){showToast('Model ID unknown','err');return;}var r=await api('GET','/models/'+encodeURIComponent(sec.modelId));if(!r||r.error){showToast(r&&r.error||'Failed to load model','err');return;}document.getElementById('mainView').style.display='none';document.getElementById('editorView').classList.add('active');document.getElementById('editorTitle').textContent=(r.name||sec.modelName)+' (schema)';document.getElementById('editorPath').textContent='models/'+(r.name||sec.modelName);document.getElementById('editorStatus').textContent='Read only';var tb=document.querySelector('#editorView .editor-toolbar');var saveBtn=tb&&tb.querySelector('.btn.primary');if(saveBtn)saveBtn.style.display='none';await ensureMonaco();var container=document.getElementById('editorContainer');if(monacoEditor){monacoEditor.dispose();monacoEditor=null;}monacoEditor=monaco.editor.create(container,{value:JSON.stringify(r,null,2),language:'json',theme:'symphonee',fontSize:13,fontFamily:"'Cascadia Code',Consolas,monospace",minimap:{enabled:true},scrollBeyondLastLine:false,automaticLayout:true,lineNumbers:'on',readOnly:true,padding:{top:8},tabSize:2});}
async function saveEditor(){if(!monacoEditor||!editorCtx)return;var parsed;try{parsed=JSON.parse(monacoEditor.getValue());}catch(e){document.getElementById('editorStatus').innerHTML='<span class="err-text">Invalid JSON</span>';return;}document.getElementById('editorStatus').textContent='Saving...';var patch={};if(parsed.name)patch.name=parsed.name;if(parsed.data)patch.data=parsed.data;if(parsed.published)patch.published=parsed.published;var r=await api('PATCH','/content/'+editorCtx.modelName+'/'+editorCtx.entryId,patch);if(r.error)document.getElementById('editorStatus').innerHTML='<span class="err-text">'+esc(r.error)+'</span>';else{document.getElementById('editorStatus').textContent='Saved';showToast('Updated','ok');await loadSection();}}
function ensureMonaco(){if(monacoReady)return Promise.resolve();return new Promise(function(resolve){var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js';s.onload=function(){require.config({paths:{vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs'}});require(['vs/editor/editor.main'],function(){monacoReady=true;var cs=getComputedStyle(document.documentElement);monaco.editor.defineTheme('symphonee',{base:'vs-dark',inherit:true,rules:[],colors:{'editor.background':cs.getPropertyValue('--crust').trim(),'editor.lineHighlightBackground':cs.getPropertyValue('--surface0').trim(),'editorLineNumber.foreground':cs.getPropertyValue('--overlay0').trim()}});resolve();});};document.head.appendChild(s);});}

function askSelect(opts){return new Promise(function(resolve){var root=document.getElementById('modalRoot');var oh=(opts.options||[]).map(function(o){return'<option value="'+esc(o.value)+'">'+esc(o.label)+'</option>';}).join('');root.innerHTML='<div class="modal-overlay"><div class="modal"><div class="modal-header">'+esc(opts.title)+'</div><div class="modal-body"><label class="field-label">'+esc(opts.label)+'</label><select class="field-input" id="ms">'+oh+'</select></div><div class="modal-actions"><button class="btn" id="mc">Cancel</button><button class="btn primary" id="mo">OK</button></div></div></div>';document.getElementById('mc').onclick=function(){root.innerHTML='';resolve(null);};document.getElementById('mo').onclick=function(){root.innerHTML='';resolve(document.getElementById('ms').value);};});}
function showToast(msg,level){var ex=document.querySelector('.toast');if(ex)ex.remove();var el=document.createElement('div');el.className='toast'+(level?' '+level:'');el.textContent=msg;document.body.appendChild(el);setTimeout(function(){el.remove();},3000);}

async function api(m,p,b){try{var o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);return await(await fetch(API+p,o)).json();}catch(e){return{error:e.message};}}

function displayName(n){return(n||'').split(/[-_]/).map(function(w){return w.charAt(0).toUpperCase()+w.slice(1);}).join(' ');}
function timeAgo(ts){if(!ts)return'';var d=Date.now()-new Date(ts).getTime(),m=Math.floor(d/60000);if(m<1)return'now';if(m<60)return m+'m ago';var h=Math.floor(m/60);if(h<24)return h+'h ago';var dy=Math.floor(h/24);if(dy<30)return dy+'d ago';return new Date(ts).toLocaleDateString();}
function formatBytes(b){if(!b)return'0 B';var k=1024,s=['B','KB','MB','GB'];var i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i];}
